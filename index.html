<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>menteclara</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="leavesContainer" class="leaves-container"></div>
  
  <header class="site-header">
    <div class="logo">mente<span>clara</span></div>
    <nav class="site-nav" aria-label="Navegação principal">
      <a href="#sobre">sobre</a>
      <a href="#" id="favLink">favoritos</a>
    </nav>
  </header>

  <main class="page-container">
    <section class="hero">
      <h1>Uma mensagem para o seu dia</h1>
      <p>Escolha um foco e receba uma palavra positiva criada para você.</p>
    </section>

    <section class="theme-selector">
      <label>Qual é o foco hoje?</label>
      <div class="chips" role="list">
        <button type="button" class="chip active" data-theme="autoestima">Autoestima</button>
        <button type="button" class="chip" data-theme="confianca">Confiança</button>
        <button type="button" class="chip" data-theme="presenca">Presença</button>
        <button type="button" class="chip" data-theme="coragem">Coragem</button>
        <button type="button" class="chip" data-theme="leveza">Leveza</button>
        <button type="button" class="chip" data-theme="conhecimento">Conhecimento</button>
        <button type="button" class="chip" data-theme="sabedoria">🦉 Sabedoria</button>
      </div>
    </section>

    <button id="generateButton" class="primary-button" type="button">
      <span>Gerar mensagem</span>
      <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>

    <section class="breaking-chains">
      <svg viewBox="0 0 400 200" aria-hidden="true">
        <line x1="50" y1="100" x2="150" y2="100" stroke="#d1d5db" stroke-width="8" stroke-linecap="round"></line>
        <circle cx="180" cy="100" r="20" fill="none" stroke="#5DCAA5" stroke-width="8"></circle>
        <circle cx="220" cy="100" r="20" fill="none" stroke="#5DCAA5" stroke-width="8"></circle>
        <line x1="250" y1="100" x2="350" y2="100" stroke="#d1d5db" stroke-width="8" stroke-linecap="round"></line>
        <text x="200" y="150" text-anchor="middle" fill="#9ca3af" font-size="14">Correntes que se quebram</text>
      </svg>
    </section>

    <section id="messageCard" class="message-card hidden" aria-live="polite">
      <div class="message-header">
        <span id="messageTheme" class="message-tag">Autoestima</span>
      </div>
      <p id="messageText" class="message-text"></p>
      <p class="message-author">— mensagem do dia</p>
      <div class="card-actions">
        <button id="newButton" type="button">nova</button>
        <button id="saveButton" type="button">salvar</button>
        <button id="shareButton" type="button">compartilhar</button>
      </div>
      <p id="statusMessage" class="status-text"></p>
    </section>

    <section id="favoritesView" class="favorites-view hidden">
      <button id="backButton" class="back-button" type="button">← voltar</button>
      <h2>Minhas mensagens</h2>
      <div id="favoritesList" class="favorites-list"></div>
      <p id="emptyState" class="empty-state">Nenhuma mensagem salva ainda. Gere uma e clique em "salvar".</p>
    </section>
  </main>

  <footer class="site-footer" id="sobre">
    <p>Palavras simples para trazer mais clareza ao seu dia.</p>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
